<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFS Traversal Visualization</title>
    <link rel="stylesheet" href="../../../assets/common.css">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
        }
    }
    </script>
</head>
<body>
    <h1>Depth-First Search (DFS) Traversal</h1>

    <div class="controls">
        <div class="control-group">
            <label for="start-node">Start Node:</label>
            <select id="start-node">
                <!-- Options populated by JS -->
            </select>
            <button id="btn-generate">New Graph</button>
        </div>

        <div class="control-group">
            <label for="speed">Speed:</label>
            <input type="range" id="speed" min="1" max="100" value="50">
        </div>

        <div class="control-group">
            <button id="btn-start">Start</button>
            <button id="btn-pause" disabled>Pause</button>
            <button id="btn-reset">Reset</button>
        </div>
    </div>

    <div class="stats">
        <span id="status-text">Ready</span>
        <span id="info-text"></span>
    </div>

    <div class="visualization-layout">
        <div id="viz-container"></div>
        <div class="sidebar">
            <h3>Stack State</h3>
            <div id="stack-container"></div>

            <div class="legend">
                <h4>Legend</h4>
                <div class="legend-item"><span class="color-box unvisited"></span> Unvisited</div>
                <div class="legend-item"><span class="color-box in-stack"></span> In Stack</div>
                <div class="legend-item"><span class="color-box processing"></span> Processing</div>
                <div class="legend-item"><span class="color-box visited"></span> Visited</div>
            </div>
        </div>
    </div>

    <div class="instructions">
        <h3>Instructions</h3>
        <p>Select a start node and click "Start". DFS explores the graph by going as deep as possible before backtracking, using a Stack.</p>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
