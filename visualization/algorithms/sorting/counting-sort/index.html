<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Sort Visualization</title>
    <link rel="stylesheet" href="../../../assets/common.css">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
        }
    }
    </script>
</head>
<body>
    <div class="nav">
        <a href="../../index.html">&larr; Back to Visualizations</a>
    </div>

    <h1>Counting Sort Visualization</h1>

    <div class="controls">
        <label for="array-size">Size:</label>
        <input type="range" id="array-size" min="5" max="30" value="15">
        <span id="array-size-display">15</span>

        <label for="max-value">Max Value (Range 0-X):</label>
        <input type="range" id="max-value" min="5" max="100" value="20">
        <span id="max-value-display">20</span>

        <label for="speed">Speed:</label>
        <input type="range" id="speed" min="1" max="100" value="50">

        <button id="btn-generate">Generate New Array</button>
        <button id="btn-start">Start Sort</button>
        <button id="btn-pause" disabled>Pause</button>
        <button id="btn-reset">Reset</button>
    </div>

    <div class="stats">
        <span id="status-text">Ready</span>
        <span id="phase-text"></span>
    </div>

    <div id="viz-container">
        <div class="array-section">
            <h3>Input Array</h3>
            <div id="input-array-container" class="svg-container"></div>
        </div>

        <div class="array-section">
            <h3>Count Array</h3>
            <div id="count-array-container" class="svg-container"></div>
        </div>

        <div class="array-section">
            <h3>Cumulative Count Array</h3>
            <div id="cumulative-array-container" class="svg-container"></div>
        </div>

        <div class="array-section">
            <h3>Output Array</h3>
            <div id="output-array-container" class="svg-container"></div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
