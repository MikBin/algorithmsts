<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Sort Visualization</title>
    <link rel="stylesheet" href="../../../assets/common.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Counting Sort Visualization</h1>
    
    <div class="controls">
        <label for="array-size">Array Size:</label>
        <input type="number" id="array-size" min="5" max="50" value="15" aria-label="Array Size">
        
        <label for="max-value">Max Value:</label>
        <input type="number" id="max-value" min="10" max="100" value="20" aria-label="Max Value">
        
        <label for="speed">Animation Speed (ms):</label>
        <input type="range" id="speed" min="10" max="2000" value="500" aria-label="Speed">
        
        <button id="btn-generate" aria-label="Generate Random Array">Generate Random Array</button>
        <button id="btn-start" aria-label="Start Sort">Start Sort</button>
        <button id="btn-pause" aria-label="Pause">Pause</button>
        <button id="btn-reset" aria-label="Reset">Reset</button>
    </div>
    
    <div class="stats">
        <span>Status: <strong id="status-text">Ready</strong></span>
        <span>Phase: <strong id="phase-text">-</strong></span>
    </div>

    <div id="viz-container">
        <div id="main-array-container"></div>
        <div id="count-array-container"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
