<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Binary Heap Visualization</title>
    <link rel="stylesheet" href="../../assets/common.css" />
    <link rel="stylesheet" href="../../assets/animation-controller.css" />
    <style>
      /* Local overrides if necessary */
    </style>
  </head>
  <body>
    <h1>Binary Heap Visualization</h1>

    <div class="controls">
      <input type="number" id="node-value" placeholder="Enter number"  aria-label="Enter number"/>
      <button id="add-node" aria-label="Insert">Insert</button>
      <button id="poll-node" aria-label="Poll (Extract Min/Max)">Poll (Extract Min/Max)</button>
      <button id="random-node" aria-label="Random">Random</button>
      <button id="clear-node" aria-label="Clear">Clear</button>
      <label>
        <input type="checkbox" id="min-heap-toggle" checked aria-label="Min Heap Toggle"> Min Heap
      </label>
    </div>

    <div id="playback-controls-container"></div>
    <div id="tree-container"></div>

    <script type="module" src="main.js"></script>
  </body>
</html>
